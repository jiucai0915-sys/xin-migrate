<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="信迁 Agent 图标">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1620"/><stop offset="1" stop-color="#0A0F14"/>
    </linearGradient>
    <linearGradient id="acc" x1="48" y1="40" x2="100" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3BF5C0"/><stop offset="1" stop-color="#00C48F"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)" stroke="#00E0A4" stroke-opacity="0.45" stroke-width="2"/>

  <!-- 左括号：旧代码（暗） -->
  <path d="M45 33 H32 V95 H45" fill="none" stroke="#5C6B7A" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 迁移箭头（霓虹绿·发光） -->
  <g filter="url(#glow)">
    <path d="M51 64 H72" stroke="url(#acc)" stroke-width="6.5" stroke-linecap="round"/>
    <path d="M67 55 L82 64 L67 73 Z" fill="url(#acc)"/>
  </g>

  <!-- 右括号：新代码（亮） -->
  <path d="M83 33 H96 V95 H83" fill="none" stroke="url(#acc)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
