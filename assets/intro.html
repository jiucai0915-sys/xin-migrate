<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>信迁 Agent · 进场动画（Lightfall）</title>
<style>
  :root{
    --accent:#00E0A4; --accent2:#3BF5C0; --dim:#5C6B7A;
    --bg0:#070B10; --bg1:#0E1620;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg0);overflow:hidden;
    font-family:'PingFang SC','Microsoft YaHei','Hiragino Sans GB',-apple-system,sans-serif;}
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(130% 100% at 50% -10%, #13212c 0%, var(--bg1) 42%, var(--bg0) 100%);}

  /* ===== Lightfall 背景：顶部倾泻的光束 + 飘落光丝 ===== */
  .lightfall{position:absolute;inset:0;overflow:hidden;opacity:0;
    animation:lfIn 2.2s var(--ease) .1s forwards;}
  @keyframes lfIn{to{opacity:1}}

  /* 顶部光源辉光 */
  .lightfall::before{content:"";position:absolute;top:-30%;left:50%;transform:translateX(-50%);
    width:120%;height:80%;
    background:radial-gradient(60% 60% at 50% 0%, rgba(0,224,164,.20), rgba(0,224,164,0) 70%);
    filter:blur(10px);}

  /* 光束（god-rays）：从顶部呈扇形垂落，缓慢摆动 */
  .beam{position:absolute;top:-12%;height:128%;width:160px;transform-origin:top center;
    background:linear-gradient(180deg, rgba(0,224,164,0) 0%, rgba(0,224,164,.22) 32%, rgba(59,245,192,.05) 70%, rgba(0,224,164,0) 100%);
    filter:blur(30px);mix-blend-mode:screen;animation:sway 9s ease-in-out infinite;}
  .beam.b1{left:24%;transform:rotate(-12deg);animation-delay:-1s;opacity:.9}
  .beam.b2{left:42%;transform:rotate(-4deg);width:200px;animation-delay:-3.5s}
  .beam.b3{left:56%;transform:rotate(5deg);width:180px;animation-delay:-6s;opacity:.85}
  .beam.b4{left:70%;transform:rotate(13deg);width:140px;animation-delay:-2s;opacity:.7}
  @keyframes sway{0%,100%{transform:translateX(-14px) rotate(var(--r,0deg));opacity:.55}
    50%{transform:translateX(14px) rotate(var(--r,0deg));opacity:1}}
  .beam.b1{--r:-12deg}.beam.b2{--r:-4deg}.beam.b3{--r:5deg}.beam.b4{--r:13deg}

  /* 飘落光丝（lightfall 雨）：JS 生成 */
  .fall{position:absolute;inset:0}
  .streak{position:absolute;top:-160px;width:1.6px;border-radius:2px;
    background:linear-gradient(180deg, rgba(59,245,192,0), rgba(59,245,192,.85), rgba(0,224,164,0));
    filter:blur(.4px);animation:fallDown linear infinite;}
  @keyframes fallDown{
    0%{transform:translateY(-160px);opacity:0}
    10%{opacity:1}85%{opacity:1}
    100%{transform:translateY(108vh);opacity:0}}

  /* 极淡底纹网格 */
  .grid{position:absolute;inset:0;opacity:.5;
    background-image:linear-gradient(rgba(0,224,164,.045) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(0,224,164,.045) 1px,transparent 1px);
    background-size:48px 48px;mask-image:radial-gradient(circle at 50% 42%,#000 28%,transparent 74%);}

  /* ===== logo 揭幕（保留原 blur-text 苹果风） ===== */
  .lockup{position:relative;z-index:5;display:flex;align-items:center;gap:34px;padding:0 24px}
  .icon{width:120px;height:120px;flex:none;
    animation:iconGlow 1.2s var(--ease) 1.8s forwards;filter:drop-shadow(0 0 0 rgba(0,224,164,0))}
  @keyframes iconGlow{to{filter:drop-shadow(0 0 24px rgba(0,224,164,.5))}}
  .brk{stroke-dasharray:200;stroke-dashoffset:200}
  .brk.l{animation:draw .9s var(--ease) .7s forwards}
  .brk.r{animation:draw .9s var(--ease) 1.0s forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .arrow{opacity:0;transform-box:fill-box;transform-origin:center;transform:scale(.4);
    animation:pop .7s var(--ease) 1.45s forwards}
  @keyframes pop{60%{opacity:1;transform:scale(1.18)}100%{opacity:1;transform:scale(1)}}

  .text{display:flex;flex-direction:column;gap:6px}
  .row1{display:flex;align-items:baseline;gap:16px}
  .zh{font-size:74px;font-weight:800;letter-spacing:6px;color:#F2FBF7;display:flex;
    text-shadow:0 2px 30px rgba(0,224,164,.18)}
  .zh span{display:inline-block;opacity:0;filter:blur(16px);transform:translateY(18px);
    animation:blurIn .9s var(--ease) forwards}
  .zh span:nth-child(1){animation-delay:1.75s}
  .zh span:nth-child(2){animation-delay:1.92s}
  .en{font-size:40px;font-weight:700;letter-spacing:1px;
    background:linear-gradient(120deg,var(--accent2),var(--accent));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    opacity:0;filter:blur(14px);transform:translateY(14px);
    animation:blurIn .9s var(--ease) 2.15s forwards}
  .tag{font-size:18px;color:#9fb3ba;letter-spacing:.5px;font-family:'SFMono-Regular',Consolas,monospace;
    opacity:0;filter:blur(12px);transform:translateY(12px);animation:blurIn .9s var(--ease) 2.45s forwards}
  .sub{display:flex;align-items:center;gap:9px;font-size:14.5px;color:#7CF2B8;font-weight:600;
    opacity:0;transform:translateY(10px);animation:fadeUp .9s var(--ease) 2.7s forwards}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 10px var(--accent);animation:pulse 2.4s ease-in-out 3.2s infinite}
  @keyframes blurIn{to{opacity:1;filter:blur(0);transform:translateY(0)}}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{box-shadow:0 0 8px var(--accent)}50%{box-shadow:0 0 18px var(--accent)}}

  .shine{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:20px;z-index:6}
  .shine::after{content:"";position:absolute;top:-40%;left:-60%;width:38%;height:180%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.16),transparent);
    transform:skewX(-18deg);animation:sweep 1.6s var(--ease) 3.0s 1}
  @keyframes sweep{to{left:130%}}

  .replay{position:fixed;right:18px;bottom:16px;color:#5C6B7A;font-size:13px;z-index:9;
    border:1px solid #1f2c38;border-radius:20px;padding:6px 14px;cursor:pointer;
    background:rgba(20,27,36,.6);user-select:none;opacity:0;animation:fadeUp .6s 3.6s forwards;transition:.2s}
  .replay:hover{color:var(--accent2);border-color:var(--accent)}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="lightfall">
      <div class="beam b1"></div><div class="beam b2"></div>
      <div class="beam b3"></div><div class="beam b4"></div>
      <div class="fall" id="fall"></div>
    </div>
    <div class="grid"></div>

    <div class="lockup">
      <div class="shine"></div>
      <svg class="icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="ia" x1="20" y1="20" x2="100" y2="100">
          <stop stop-color="#3BF5C0"/><stop offset="1" stop-color="#00C48F"/></linearGradient></defs>
        <path class="brk l" d="M40 22 H22 V98 H40" stroke="#5C6B7A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        <g class="arrow">
          <path d="M48 60 H72" stroke="url(#ia)" stroke-width="7" stroke-linecap="round"/>
          <path d="M66 50 L84 60 L66 70 Z" fill="url(#ia)"/>
        </g>
        <path class="brk r" d="M80 22 H98 V98 H80" stroke="url(#ia)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="text">
        <div class="row1"><div class="zh"><span>信</span><span>迁</span></div><div class="en">Agent</div></div>
        <div class="tag">XinMigrate · 代码不出域，迁移自动化</div>
        <div class="sub"><span class="dot"></span>纯内网离线运行 · Oracle → 达梦 / 金仓</div>
      </div>
    </div>
    <div class="replay" onclick="replay()">↺ 重播</div>
  </div>
<script>
  // 生成飘落光丝（lightfall 雨）
  function seedStreaks(root){
    const fall=root.querySelector('#fall'); if(!fall) return;
    const N=34;
    for(let i=0;i<N;i++){
      const s=document.createElement('div'); s.className='streak';
      const h=60+Math.random()*110;
      s.style.left=(Math.random()*100)+'%';
      s.style.height=h+'px';
      s.style.opacity=(0.25+Math.random()*0.6).toFixed(2);
      s.style.animationDuration=(3.2+Math.random()*4.5).toFixed(2)+'s';
      s.style.animationDelay=(-Math.random()*7).toFixed(2)+'s';
      fall.appendChild(s);
    }
  }
  seedStreaks(document);
  function replay(){
    const s=document.getElementById('stage');
    const c=s.cloneNode(true);
    s.parentNode.replaceChild(c,s);
    seedStreaks(c);
  }
</script>
</body>
</html>
