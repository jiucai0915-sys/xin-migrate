<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>信迁 · ASCII Text</title>
<style>
  html,body{margin:0;height:100%;background:#070B10;overflow:hidden;
    display:flex;align-items:center;justify-content:center}
  #out{margin:0;font-family:'SFMono-Regular',Consolas,'Courier New',monospace;
    font-size:11px;line-height:1em;letter-spacing:0;white-space:pre;
    color:#00E0A4;text-shadow:0 0 8px rgba(0,224,164,.45);user-select:none}
  .cap{position:fixed;bottom:18px;left:0;right:0;text-align:center;color:#5C6B7A;
    font-family:'PingFang SC',sans-serif;font-size:13px;letter-spacing:1px}
</style>
</head>
<body>
  <pre id="out"></pre>
  <div class="cap">信迁 Agent · ASCII Text</div>
<script>
// ===== 复刻 reactbits ASCIIText 视觉（纯 Canvas2D，零依赖、可离线）=====
const TEXT = '信迁';
const CHARSET = " .'`^\",:;Il!i~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$";
const INVERT = true;
const ROWS = 46;          // 输出行数（越大越精细）
const CHAR_ASPECT = 0.55; // 等宽字符 宽/高 比

// 1) 把文字画到离屏画布（白字透明底）
const tc = document.createElement('canvas');
const tx = tc.getContext('2d');
const FS = 240;
tx.font = `700 ${FS}px 'PingFang SC','Microsoft YaHei',sans-serif`;
const m = tx.measureText(TEXT);
const tw = Math.ceil(m.width) + 40;
const th = Math.ceil((m.actualBoundingBoxAscent||FS*0.8) + (m.actualBoundingBoxDescent||FS*0.2)) + 40;
tc.width = tw; tc.height = th;
function drawText(){
  tx.clearRect(0,0,tw,th);
  tx.font = `700 ${FS}px 'PingFang SC','Microsoft YaHei',sans-serif`;
  tx.textBaseline = 'top';
  // 明暗渐变填充：让 ASCII 字符产生疏密层次（模拟原版 3D 光影）
  const g = tx.createLinearGradient(0,0,tw,th);
  g.addColorStop(0,'#ffffff');
  g.addColorStop(0.5,'#9aa6ad');
  g.addColorStop(1,'#4a5560');
  tx.fillStyle = g;
  tx.fillText(TEXT, 20, 20);
}
drawText();

// 2) 采样画布（小尺寸 cols×rows）
const cols = Math.round(ROWS * (tw/th) / CHAR_ASPECT);
const rows = ROWS;
const sc = document.createElement('canvas');
sc.width = cols; sc.height = rows;
const sx = sc.getContext('2d');
sx.imageSmoothingEnabled = true;

const out = document.getElementById('out');

function asciify(){
  const img = sx.getImageData(0,0,cols,rows).data;
  let s = '';
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const i = (x + y*cols)*4;
      const a = img[i+3];
      if(a < 8){ s += ' '; continue; }
      const gray = (0.3*img[i] + 0.6*img[i+1] + 0.1*img[i+2])/255;
      let idx = Math.floor((1-gray)*(CHARSET.length-1));
      if(INVERT) idx = CHARSET.length-1-idx;
      s += CHARSET[Math.max(0,Math.min(CHARSET.length-1,idx))];
    }
    s += '\n';
  }
  out.textContent = s;
}

// 3) 每帧：带波动地把大图缩绘进采样画布，再转字符
function frame(t){
  const time = t*0.001;
  sx.clearRect(0,0,cols,rows);
  // 逐行带水平/垂直波动（复刻原版 wave 抖动）
  for(let y=0;y<rows;y++){
    const srcY = y/rows*th;
    const dx = Math.sin(time*2.0 + y*0.28)*1.4;          // 横向波
    const dy = Math.cos(time*1.6 + y*0.20)*0.5;          // 纵向微抖
    sx.drawImage(tc, 0, srcY, tw, th/rows, dx, y+dy, cols, 1.15);
  }
  asciify();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
